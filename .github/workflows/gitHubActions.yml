name: Run FinalSurge with Allure History

on:
  push:
    branches: [ "master", "feature/*" ]
  pull_request:
    branches: [ "master", "feature/*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ✅ Установка Allure
      - name: Install Allure
        run: |
          sudo apt-get update
          sudo apt-get install -y allure

      - name: Verify Allure installation
        run: allure --version

      # ✅ Запуск тестов
      - name: Run autotests
        run: mvn clean test
        continue-on-error: true

      # ✅ Клонирование ветки с историей (если существует)
      - name: Get Allure history
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gp-pagesnew
          path: gp-pagesnew

      # ✅ Копирование истории в allure-report (если есть)
      - name: Copy history to allure-report
        if: always()
        run: |
          mkdir -p allure-report
          if [ -d "gp-pagesnew" ]; then
            cp -r gp-pagesnew/history allure-report/history || true
          fi

      # ✅ Генерация Allure отчета с историей
      - name: Generate Allure report
        if: always()
        run: |
          allure generate target/allure-results --clean -o allure-report

      # ✅ Загрузка результатов
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

      # ✅ Загрузка отчета
      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      # ✅ Деплой на GitHub Pages
      - name: Deploy report to Github Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gp-pagesnew
          publish_dir: allure-report
          force_orphan: false
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Обновление Allure отчета #${{ github.run_number }}'