name: Run FinalSurge Tests with Allure

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      #  Установка Allure через официальный action
      - name: Install Allure
        uses: simple-elf/allure-action@v1
        with:
          allure-version: '2.29.1'

      #  Проверка установки Allure
      - name: Verify Allure installation
        run: allure --version

      - name: Run tests
        run: mvn clean test
        continue-on-error: true

      #  Загрузка Allure results как артефакт
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

      #  Генерация Allure отчета
      - name: Generate Allure report
        if: always()
        run: |
          allure generate target/allure-results --clean -o allure-report

      #  Загрузка отчета как артефакт
      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      #  Публикация на GitHub Pages
      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
          keep_files: true
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Обновление Allure отчета #${{ github.run_number }}'